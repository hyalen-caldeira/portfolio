    <g stroke="#ffb84d" stroke-width="2" opacity="0.75">
      <line x1="0" y1="-260" x2="-185" y2="-130"/>
      <line x1="0" y1="-260" x2="185" y2="-130"/>
      <line x1="-185" y1="-130" x2="0" y2="0"/>
      <line x1="185" y1="-130" x2="0" y2="0"/>
      <line x1="0" y1="0" x2="-185" y2="130"/>
      <line x1="0" y1="0" x2="185" y2="130"/>
      <line x1="-185" y1="130" x2="0" y2="260"/>
      <line x1="185" y1="130" x2="0" y2="260"/>
      <line x1="-185" y1="-130" x2="-185" y2="130"/>
      <line x1="185" y1="-130" x2="185" y2="130"/>
    </g>

    <use href="#hex" transform="translate(0,-260)"/>
    <use href="#hex" transform="translate(-185,-130)"/>
