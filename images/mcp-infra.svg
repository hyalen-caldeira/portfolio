  <g font-family="Helvetica, Arial, sans-serif" fill="#ffedd5">
    <text x="110" y="940" font-size="72" font-weight="700" letter-spacing="6">MCP INFRA</text>
    <text x="110" y="982" font-size="22" font-weight="300" letter-spacing="7" fill="#ff9900">TERRAGRUNT  ·  AWS  ·  IAC</text>
