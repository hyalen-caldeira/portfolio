    <text x="60" y="300">    region  = "us-east-1"</text>
    <text x="60" y="328">  }</text>
    <text x="60" y="356">}</text>
    <text x="60" y="408">terraform {</text>
    <text x="60" y="436">  source = "../../modules/ec2"</text>
    <text x="60" y="464">}</text>
    <text x="60" y="516">inputs = {</text>
    <text x="60" y="544">  ami        = "ami-..."</text>
    <text x="60" y="572">  elastic_ip = true</text>
    <text x="60" y="600">  route53    = "mcp.hyalen.us"</text>
    <text x="60" y="628">}</text>
  </g>

