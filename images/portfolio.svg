<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1830"/>
      <stop offset="1" stop-color="#050a18"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e74c3c" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#e74c3c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="windowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13203d"/>
      <stop offset="1" stop-color="#0a1428"/>
    </linearGradient>
    <g id="tileMini">
      <rect width="120" height="92" rx="6" fill="#1a2540" stroke="#e74c3c" stroke-width="1.6"/>
      <rect x="0" y="0" width="120" height="56" rx="6" fill="#e74c3c" opacity="0.35"/>
      <rect x="10" y="64" width="78" height="6" rx="1" fill="#fca5a5" opacity="0.85"/>
      <rect x="10" y="76" width="58" height="6" rx="1" fill="#fca5a5" opacity="0.55"/>
    </g>
    <g id="tileMiniHot">
      <rect width="120" height="92" rx="6" fill="#1a2540" stroke="#fca5a5" stroke-width="2.4"/>
      <rect x="0" y="0" width="120" height="56" rx="6" fill="#e74c3c" opacity="0.8"/>
      <rect x="10" y="64" width="78" height="6" rx="1" fill="#fecaca"/>
      <rect x="10" y="76" width="58" height="6" rx="1" fill="#fecaca" opacity="0.8"/>
    </g>
  </defs>

  <rect width="1536" height="1024" fill="url(#bg)"/>

  <g stroke="#e74c3c" stroke-width="0.5" opacity="0.08">
    <path d="M0 256H1536M0 512H1536M0 768H1536"/>
    <path d="M256 0V1024M512 0V1024M768 0V1024M1024 0V1024M1280 0V1024"/>
  </g>

  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#e74c3c" opacity="0.34">
    <text x="60" y="160">&lt;section id="portfolio"&gt;</text>
    <text x="60" y="188">  &lt;div class="row"&gt;</text>
    <text x="60" y="216">    &lt;div class="tile"&gt;</text>
    <text x="60" y="244">      COBOL AI</text>
    <text x="60" y="272">    &lt;/div&gt;</text>
    <text x="60" y="300">    &lt;div class="tile"&gt;</text>
    <text x="60" y="328">      DocWise</text>
    <text x="60" y="356">    &lt;/div&gt;</text>
    <text x="60" y="384">    &lt;div class="tile"&gt;</text>
    <text x="60" y="412">      iFlow GenAI</text>
    <text x="60" y="440">    &lt;/div&gt;</text>
    <text x="60" y="468">  &lt;/div&gt;</text>
    <text x="60" y="496">&lt;/section&gt;</text>
    <text x="60" y="548">HTML  ·  CSS  ·  JS</text>
    <text x="60" y="576">Bootstrap  ·  jQuery</text>
  </g>

  <g transform="translate(1060,440)">
    <circle cx="0" cy="0" r="320" fill="url(#halo)"/>

    <!-- browser window -->
    <rect x="-260" y="-220" width="520" height="380" rx="10" fill="url(#windowGrad)" stroke="#e74c3c" stroke-width="2.5"/>

    <!-- chrome bar -->
    <rect x="-260" y="-220" width="520" height="36" rx="10" fill="#0a1428"/>
    <rect x="-260" y="-200" width="520" height="16" fill="#0a1428"/>
    <circle cx="-238" cy="-202" r="6" fill="#e74c3c"/>
    <circle cx="-218" cy="-202" r="6" fill="#f59e0b"/>
    <circle cx="-198" cy="-202" r="6" fill="#10b981"/>
    <rect x="-160" y="-212" width="380" height="20" rx="10" fill="#13203d" stroke="#e74c3c" stroke-width="1" opacity="0.7"/>
    <text x="-150" y="-198" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#fca5a5">hyalen.us  ·  /portfolio</text>

    <!-- tile grid 3x2 -->
    <use href="#tileMini" transform="translate(-240,-160)"/>
    <use href="#tileMiniHot" transform="translate(-100,-160)"/>
    <use href="#tileMini" transform="translate(40,-160)"/>
    <use href="#tileMini" transform="translate(-240,-50)"/>
    <use href="#tileMini" transform="translate(-100,-50)"/>
    <use href="#tileMini" transform="translate(40,-50)"/>
    <use href="#tileMini" transform="translate(-240,60)"/>
    <use href="#tileMini" transform="translate(-100,60)"/>
    <use href="#tileMini" transform="translate(40,60)"/>

    <!-- bottom info row -->
    <rect x="-240" y="172" width="160" height="10" rx="2" fill="#e74c3c" opacity="0.75"/>
    <rect x="-240" y="190" width="120" height="8" rx="2" fill="#e74c3c" opacity="0.5"/>

    <!-- accent badges floating -->
    <g>
      <circle cx="-300" cy="-260" r="22" fill="#991b1b" stroke="#fca5a5" stroke-width="2"/>
      <text x="-300" y="-254" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#fee2e2">UI</text>
      <circle cx="290" cy="-260" r="22" fill="#991b1b" stroke="#fca5a5" stroke-width="2"/>
      <text x="290" y="-254" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#fee2e2">WEB</text>
      <circle cx="290" cy="190" r="22" fill="#991b1b" stroke="#fca5a5" stroke-width="2"/>
      <text x="290" y="196" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#fee2e2">AWS</text>
    </g>
  </g>

  <g font-family="Helvetica, Arial, sans-serif" fill="#fee2e2">
    <text x="110" y="940" font-size="72" font-weight="700" letter-spacing="6">PORTFOLIO</text>
    <text x="110" y="982" font-size="22" font-weight="300" letter-spacing="7" fill="#e74c3c">PERSONAL  ·  WEB  ·  AWS</text>
  </g>
</svg>
