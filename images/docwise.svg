<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1830"/>
      <stop offset="1" stop-color="#050a18"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hubGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ede9fe"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </radialGradient>
    <g id="doc">
      <rect width="44" height="56" rx="3" fill="#13203d" stroke="#a78bfa" stroke-width="1.6"/>
      <line x1="7" y1="13" x2="37" y2="13" stroke="#a78bfa" stroke-width="1.3"/>
      <line x1="7" y1="22" x2="32" y2="22" stroke="#a78bfa" stroke-width="1.3"/>
