<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1830"/>
      <stop offset="1" stop-color="#050a18"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hubGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#d97706"/>
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#fcd34d"/>
    </marker>
    <g id="step">
      <rect x="-44" y="-28" width="88" height="56" rx="6" fill="#13203d" stroke="#f59e0b" stroke-width="1.8"/>
      <circle cx="-26" cy="0" r="4" fill="#fcd34d"/>
      <line x1="-16" y1="-8" x2="30" y2="-8" stroke="#fcd34d" stroke-width="1.4"/>
      <line x1="-16" y1="0" x2="22" y2="0" stroke="#fcd34d" stroke-width="1.4"/>
      <line x1="-16" y1="8" x2="28" y2="8" stroke="#fcd34d" stroke-width="1.4"/>
    </g>
  </defs>

  <rect width="1536" height="1024" fill="url(#bg)"/>

  <g stroke="#f59e0b" stroke-width="0.5" opacity="0.08">
    <path d="M0 256H1536M0 512H1536M0 768H1536"/>
    <path d="M256 0V1024M512 0V1024M768 0V1024M1024 0V1024M1280 0V1024"/>
  </g>

  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#f59e0b" opacity="0.34">
    <text x="60" y="160">&lt;bpmn:process id="iflow"&gt;</text>
    <text x="60" y="188">  &lt;startEvent id="s0"/&gt;</text>
    <text x="60" y="216">  &lt;sequenceFlow</text>
    <text x="60" y="244">      source="s0"</text>
    <text x="60" y="272">      target="t1"/&gt;</text>
    <text x="60" y="300">  &lt;serviceTask id="t1"/&gt;</text>
    <text x="60" y="328">  &lt;exclusiveGateway/&gt;</text>
    <text x="60" y="356">  &lt;serviceTask id="t2"/&gt;</text>
    <text x="60" y="384">  &lt;endEvent id="e0"/&gt;</text>
    <text x="60" y="412">&lt;/bpmn:process&gt;</text>
    <text x="60" y="464">node.prev  ⇄  node.next</text>
    <text x="60" y="492">doubly-linked list</text>
    <text x="60" y="544">SAP CAP  +  TypeScript</text>
    <text x="60" y="572">OpenAI  +  CDS  +  MTA</text>
  </g>

  <g transform="translate(1060,470)">
    <circle cx="0" cy="0" r="290" fill="url(#halo)"/>

    <g stroke="#fcd34d" stroke-width="2" fill="none" opacity="0.9" marker-start="url(#arrow)" marker-end="url(#arrow)">
      <path d="M -340 -210 Q -200 -250 -60 -210"/>
      <path d="M -340 -210 Q -240 -120 -160 -40"/>
      <path d="M 60 -210 Q 200 -250 340 -210"/>
      <path d="M 160 -40 Q 240 -120 340 -210"/>
      <path d="M -160 -40 Q -80 80 60 80"/>
      <path d="M -160 -40 Q 0 30 160 -40"/>
      <path d="M 160 -40 Q 240 80 340 220"/>
      <path d="M -340 -210 Q -360 -10 -340 220"/>
      <path d="M -340 220 Q -200 270 -60 220"/>
      <path d="M 60 220 Q 200 270 340 220"/>
      <path d="M -60 220 Q 0 130 60 220"/>
    </g>

    <use href="#step" transform="translate(-340,-210)"/>
    <use href="#step" transform="translate(0,-238)"/>
    <use href="#step" transform="translate(340,-210)"/>
    <use href="#step" transform="translate(-160,-40)"/>
    <use href="#step" transform="translate(160,-40)"/>
    <use href="#step" transform="translate(-340,220)"/>
    <use href="#step" transform="translate(0,250)"/>
    <use href="#step" transform="translate(340,220)"/>

    <circle cx="0" cy="0" r="46" fill="url(#hubGrad)"/>
    <circle cx="0" cy="0" r="26" fill="#fef3c7"/>
    <text x="0" y="9" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#7c2d12">⇄</text>
  </g>

  <g font-family="Helvetica, Arial, sans-serif" fill="#fef3c7">
    <text x="110" y="940" font-size="72" font-weight="700" letter-spacing="6">IFLOW</text>
    <text x="110" y="982" font-size="22" font-weight="300" letter-spacing="7" fill="#f59e0b">SAP CAP  ·  GENAI  ·  XML PARSER</text>
  </g>
